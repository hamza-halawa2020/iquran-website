server {
    listen 80;
    server_name iquran.com;
    root /var/www/iquran/browser;
    index index.html;

    # Caching for immutable hashed assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable, no-transform";
        access_log off;
    }

    # HTML must stay fresh so it points to the latest hashed bundles.
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Angular Routing
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ /index.html;
    }
}
