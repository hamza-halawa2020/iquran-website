<!-- Success Message as a Toast -->
<div *ngIf="successMessage" class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 9999;">
    <div class="toast show" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="toast-header bg-success text-white">
            <i class="fa-solid fa-check-circle me-2"></i>
            <strong class="me-auto">{{ "SUCCESS" | translate }}</strong>
            <button type="button" class="btn-close btn-close-white" (click)="successMessage = ''"></button>
        </div>
        <div class="toast-body">
            {{ successMessage }}
        </div>
    </div>
</div>

<!-- Error Message as a Toast -->
<div *ngIf="errorMessage" class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 9999;">
    <div class="toast show" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="toast-header bg-danger text-white">
            <i class="fa-solid fa-exclamation-triangle me-2"></i>
            <strong class="me-auto">{{ "ERROR" | translate }}</strong>
            <button type="button" class="btn-close btn-close-white" (click)="errorMessage = ''"></button>
        </div>
        <div class="toast-body">
            {{ errorMessage }}
        </div>
    </div>
</div>

<!-- Contact Form -->
<div class="contact-area">
    <form [formGroup]="contactForm" (ngSubmit)="onSubmit()" class="contact-form">
        <div class="row">
            <div class="col-lg-12">
                <div class="form-group">
                    <label for="name">{{ 'FULL_NAME' | translate }} *</label>
                    <input
                        type="text"
                        id="name"
                        [placeholder]="'ENTER_YOUR_NAME' | translate"
                        class="form-control"
                        [class.is-invalid]="contactForm.get('name')?.invalid && contactForm.get('name')?.touched"
                        formControlName="name"
                    />
                    <div class="invalid-feedback" *ngIf="getFieldError('name')">
                        {{ getFieldError('name') }}
                    </div>
                </div>
            </div>

            <div class="col-lg-12">
                <div class="form-group">
                    <label for="phone">{{ 'PHONE_NUMBER' | translate }} *</label>
                    <input
                        type="tel"
                        id="phone"
                        [placeholder]="'ENTER_YOUR_PHONE' | translate"
                        class="form-control"
                        [class.is-invalid]="contactForm.get('phone')?.invalid && contactForm.get('phone')?.touched"
                        formControlName="phone"
                    />
                    <div class="invalid-feedback" *ngIf="getFieldError('phone')">
                        {{ getFieldError('phone') }}
                    </div>
                </div>
            </div>

            <div class="col-lg-12">
                <div class="form-group">
                    <label for="email">{{ 'EMAIL_ADDRESS' | translate }} *</label>
                    <input
                        type="email"
                        id="email"
                        [placeholder]="'ENTER_YOUR_EMAIL' | translate"
                        class="form-control"
                        [class.is-invalid]="contactForm.get('email')?.invalid && contactForm.get('email')?.touched"
                        formControlName="email"
                    />
                    <div class="invalid-feedback" *ngIf="getFieldError('email')">
                        {{ getFieldError('email') }}
                    </div>
                </div>
            </div>

            <div class="col-lg-6">
                <div class="form-group">
                    <label for="age">{{ 'AGE' | translate }} *</label>
                    <input
                        type="number"
                        id="age"
                        [placeholder]="'ENTER_YOUR_AGE' | translate"
                        class="form-control"
                        [class.is-invalid]="contactForm.get('age')?.invalid && contactForm.get('age')?.touched"
                        formControlName="age"
                        min="1"
                        max="120"
                    />
                    <div class="invalid-feedback" *ngIf="getFieldError('age')">
                        {{ getFieldError('age') }}
                    </div>
                </div>
            </div>

            <div class="col-lg-6">
                <div class="form-group">
                    <label for="country">{{ 'COUNTRY' | translate }} *</label>
                    <input
                        type="text"
                        id="country"
                        [placeholder]="'ENTER_YOUR_COUNTRY' | translate"
                        class="form-control"
                        [class.is-invalid]="contactForm.get('country')?.invalid && contactForm.get('country')?.touched"
                        formControlName="country"
                    />
                    <div class="invalid-feedback" *ngIf="getFieldError('country')">
                        {{ getFieldError('country') }}
                    </div>
                </div>
            </div>

            <div class="col-lg-12">
                <div class="form-group">
                    <label for="course">{{ 'DESIRED_COURSE' | translate }} *</label>
                    <input
                        type="text"
                        id="course"
                        [placeholder]="'ENTER_DESIRED_COURSE' | translate"
                        class="form-control"
                        [class.is-invalid]="contactForm.get('course')?.invalid && contactForm.get('course')?.touched"
                        formControlName="course"
                    />
                    <div class="invalid-feedback" *ngIf="getFieldError('course')">
                        {{ getFieldError('course') }}
                    </div>
                </div>
            </div>

            <div class="col-lg-12">
                <div class="form-group">
                    <label for="message">{{ 'MESSAGE' | translate }} *</label>
                    <textarea
                        id="message"
                        rows="6"
                        class="form-control"
                        [class.is-invalid]="contactForm.get('message')?.invalid && contactForm.get('message')?.touched"
                        [placeholder]="'WRITE_YOUR_MESSAGE' | translate"
                        formControlName="message"
                    ></textarea>
                    <div class="invalid-feedback" *ngIf="getFieldError('message')">
                        {{ getFieldError('message') }}
                    </div>
                </div>
            </div>

            <div class="col-lg-12 text-center">
                <button
                    class="submit-btn"
                    type="submit"
                    [disabled]="isSubmitting || contactForm.invalid"
                >
                    <span *ngIf="!isSubmitting">
                        <i class="fa-solid fa-paper-plane"></i>
                        {{ "SEND_MESSAGE" | translate }}
                    </span>
                    <span *ngIf="isSubmitting">
                        <i class="fa-solid fa-spinner fa-spin"></i>
                        {{ "SENDING" | translate }}
                    </span>
                </button>
            </div>
        </div>
    </form>
</div>
