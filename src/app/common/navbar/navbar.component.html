<nav class="main-navbar" [class.sticky]="isSticky">
    <div class="navbar-container">
        <!-- Brand Logo -->
        <div class="navbar-brand">
            <a routerLink="/" (click)="closeMobileMenu()" aria-label="Online Islamic School home">
                <img
                    src="assets/images/logo.svg"
                    alt="Online Islamic School"
                    class="brand-logo"
                    width="584"
                    height="621"
                    decoding="async"
                    fetchpriority="high"
                />
            </a>
        </div>

        <!-- Desktop Navigation Menu -->
        <div id="primary-navigation" class="navbar-menu" [class.active]="!isCollapsed">
            <ul class="nav-links">
                <li *ngFor="let item of menuItems">
                    <a [routerLink]="item.route" routerLinkActive="active"
                        [routerLinkActiveOptions]="{exact: item.route === '/'}" (click)="closeMobileMenu()">
                        {{ item.label | translate }}
                    </a>
                </li>
            </ul>

            <!-- Action Buttons -->
            <div class="navbar-actions">
                <!-- Language Switcher -->
                <!-- <div class="language-switcher" ngbDropdown placement="bottom-end">
                    <button class="lang-btn" ngbDropdownToggle id="languageDropdown">
                        <span class="flag">{{ getCurrentLanguageData().flag }}</span>
                        <span class="lang-name">{{ getCurrentLanguageData().name }}</span>
                        <i class="fas fa-chevron-down"></i>
                    </button>
                    <div class="dropdown-menu" ngbDropdownMenu>
                        <button class="dropdown-item" *ngFor="let lang of languages"
                            [class.active]="lang.code === currentLanguage" (click)="switchLanguage(lang.code)">
                            <span class="flag">{{ lang.flag }}</span>
                            <span>{{ lang.name }}</span>
                            <i class="fas fa-check" *ngIf="lang.code === currentLanguage"></i>
                        </button>
                    </div>
                </div> -->

                <!-- CTA Buttons -->
                <a routerLink="/contacts" class="btn btn-outline" (click)="closeMobileMenu()">
                    {{ 'BOOK_TRIAL' | translate }}
                </a>
            </div>
        </div>

        <div class="navbar-mobile-controls">
            <a routerLink="/contacts" class="btn btn-outline mobile-contact-btn" (click)="closeMobileMenu()">
                {{ 'BOOK_TRIAL' | translate }}
            </a>

            <!-- Mobile Menu Toggle -->
            <button
            type="button"
            class="mobile-toggle"
            (click)="toggleMobileMenu()"
            [class.active]="!isCollapsed"
            [attr.aria-expanded]="!isCollapsed"
            aria-controls="primary-navigation"
            [attr.aria-label]="currentLanguage === 'ar' ? (!isCollapsed ? 'إغلاق القائمة الرئيسية' : 'فتح القائمة الرئيسية') : (!isCollapsed ? 'Close main menu' : 'Open main menu')"
        >
            <span></span>
            <span></span>
            <span></span>
            </button>
        </div>
    </div>
</nav>
