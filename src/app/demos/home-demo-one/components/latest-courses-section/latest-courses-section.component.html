<section class="courses-section section-padding" *ngIf="categories.length > 0">
    <div class="container">
        <div class="section-header text-center">
            <h2 class="section-title">{{ 'OUR_COURSE_CATEGORIES' | translate }}</h2>
        </div>

        <div class="categories-grid">
            <article class="category-card" *ngFor="let category of categories">
                <div class="category-image-wrap">
                    <img
                        [src]="category.image_url || 'assets/images/logo.webp'"
                        [alt]="category.name"
                        loading="lazy"
                    />
                </div>
                <h3>{{ category.name }}</h3>
                <p class="category-description" *ngIf="category.description">{{ category.description }}</p>
                <p *ngIf="category.courses_count !== undefined">
                    {{ category.courses_count }} {{ 'COURSES' | translate }}
                </p>
                <a
                    [routerLink]="'/courses'"
                    [queryParams]="{ category: category.id }"
                    class="category-link">
                    {{ 'VIEW_ALL_COURSES' | translate }}
                </a>
            </article>
        </div>
    </div>
</section>
