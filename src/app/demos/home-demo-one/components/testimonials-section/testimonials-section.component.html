<section class="testimonials-section section-padding" *ngIf="testimonials.length > 0">
    <div class="container">
        <div class="section-header">
            <span class="section-kicker">{{ 'NAV_TESTIMONIALS' | translate }}</span>
            <h2 class="section-title">{{ 'FEEDBACK_TITLE' | translate }}</h2>
        </div>

        <div class="testimonials-carousel-shell" [class.is-rtl]="isRtl">
            <div #testimonialsTrack class="testimonials-track" [class.is-rtl]="isRtl">
                <div #testimonialSlide class="testimonial-slide" *ngFor="let testimonial of testimonials">
                    <article class="testimonial-card">
                        <div class="card-top">
                            <div class="author-avatar">
                                <span>{{ getInitials(testimonial.client_name) }}</span>
                            </div>
                            <div class="author-info">
                                <h5>{{ testimonial.client_name }}</h5>
                                <p class="meta-line">
                                    <span class="author-country" *ngIf="testimonial.country">
                                        <i class="fa-solid fa-location-dot"></i> {{ testimonial.country }}
                                    </span>
                                    <span class="author-date" *ngIf="testimonial.created_at">{{ formatDate(testimonial.created_at) }}</span>
                                </p>
                            </div>
                        </div>

                        <div class="stars" aria-hidden="true">
                            <i class="fa-solid fa-star"></i>
                            <i class="fa-solid fa-star"></i>
                            <i class="fa-solid fa-star"></i>
                            <i class="fa-solid fa-star"></i>
                            <i class="fa-solid fa-star"></i>
                        </div>

                        <p class="testimonial-text">{{ testimonial.comment }}</p>
                    </article>
                </div>
            </div>

            <div class="carousel-controls" *ngIf="hasMultipleTestimonials">
                <button
                    type="button"
                    class="carousel-btn"
                    [disabled]="!canScrollPrev"
                    (click)="scrollTestimonials('prev')"
                    [attr.aria-label]="isRtl ? 'Scroll right' : 'Scroll left'">
                    <i class="fa-solid" [ngClass]="isRtl ? 'fa-chevron-right' : 'fa-chevron-left'"></i>
                </button>

                <button
                    type="button"
                    class="carousel-btn"
                    [disabled]="!canScrollNext"
                    (click)="scrollTestimonials('next')"
                    [attr.aria-label]="isRtl ? 'Scroll left' : 'Scroll right'">
                    <i class="fa-solid" [ngClass]="isRtl ? 'fa-chevron-left' : 'fa-chevron-right'"></i>
                </button>
            </div>

            <div class="cta-wrap">
                <a routerLink="/testimonials" class="btn-all-reviews">
                    {{ 'VIEW_ALL_TESTIMONIALS' | translate }}
                    <i class="fa-solid" [ngClass]="isRtl ? 'fa-arrow-left' : 'fa-arrow-right'"></i>
                </a>
            </div>
        </div>
    </div>
</section>
