<section class="learning-benefits section-padding">
    <div class="section-header text-center">
        <h2 class="section-title">
            {{ 'Why You\'ll Love Learning With Us' }}
        </h2>
        <p class="section-subtitle">
            {{ 'Simple, practical features that make your Quran journey easier and more enjoyable.' }}
        </p>
    </div>

    <div class="benefits-grid">
        <article class="benefit-card" *ngFor="let item of benefits">
            <div class="benefit-icon" aria-hidden="true">
                <i [class]="item.icon"></i>
            </div>
            <h3>{{ item.title }}</h3>
            <p>{{ item.description }}</p>
        </article>
    </div>
</section>
