<section class="contact-area">
    
    <section class="contact-form-section">
        <div class="container">
            <div class="row">
                <div class="col-lg-8 mx-auto">
                    <div class="contact-form-wrapper">
                        <div class="section-title text-center mb-4">
                            <h2>{{ 'BOOK_TRIAL' | translate }}</h2>
                            
                        </div>

                        <app-contact class="embedded-contact" />
                    </div>
                </div>
            </div>
        </div>
    </section>

    
    <section class="contact-info-section section-padding">
        <div class="container">
            <div class="row" *ngIf="!isLoading">
                <div class="col-lg-6 col-md-6">
                    <div class="contact-info-card">
                        <div class="contact-icon">
                            <i class="fas fa-phone"></i>
                        </div>
                        <h4>{{ 'TELEPHONE' | translate }}</h4>
                        <p *ngIf="settings.phone"><a href="tel:{{ settings.phone }}">{{ settings.phone }}</a></p>
                        <p *ngIf="settings.whatsapp"><a href="tel:{{ settings.whatsapp }}">{{ settings.whatsapp }}</a>
                        </p>
                        <p *ngIf="!settings.phone && !settings.whatsapp"></p>
                    </div>
                </div>

                <div class="col-lg-6 col-md-6">
                    <div class="contact-info-card">
                        <div class="contact-icon">
                            <i class="fas fa-envelope"></i>
                        </div>
                        <h4>{{ 'SEND_EMAIL' | translate }}</h4>
                        <p *ngIf="settings.email"><a href="mailto:{{ settings.email }}">{{ settings.email }}</a></p>
                        <p *ngIf="!settings.email">info&#64;iquran.com</p>
                    </div>
                </div>
            </div>
        </div>
    </section>
</section>
