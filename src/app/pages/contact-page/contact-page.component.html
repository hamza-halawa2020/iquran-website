<section class="contact-page">
    <div class="container">
        <div class="contact-layout">
            <aside class="contact-panel" *ngIf="!isLoading">
                <div class="info-card">
                    <div class="icon-wrap">
                        <i class="fas fa-phone"></i>
                    </div>
                    <h3>{{ 'TELEPHONE' | translate }}</h3>
                    <p *ngIf="settings.phone"><a href="tel:{{ settings.phone }}">{{ settings.phone }}</a></p>
                    <p *ngIf="settings.whatsapp"><a href="tel:{{ settings.whatsapp }}">{{ settings.whatsapp }}</a></p>
                </div>

                <div class="info-card">
                    <div class="icon-wrap">
                        <i class="fas fa-envelope"></i>
                    </div>
                    <h3>{{ 'SEND_EMAIL' | translate }}</h3>
                    <p *ngIf="settings.email"><a href="mailto:{{ settings.email }}">{{ settings.email }}</a></p>
                    <p *ngIf="!settings.email">info&#64;iquran.com</p>
                </div>

            </aside>

            <section class="form-panel">
                <div class="form-card">
                    <div class="form-header">
                        <h2>{{ 'BOOK_TRIAL' | translate }}</h2>
                    </div>
                    <app-contact class="embedded-contact" />
                </div>
            </section>
        </div>
    </div>
</section>
