<section class="review-area">
    <div class="container">
        <div class="section-title text-center">
            <h2>{{ 'CLIENT_TESTIMONIALS' | translate }}</h2>
            
        </div>

        <div class="row" *ngIf="isLoading">
            <div class="col-lg-4 col-md-6 mb-4" *ngFor="let item of [1,2,3,4,5,6]">
                <div class="skeleton-loader"></div>
            </div>
        </div>

        
        <section class="reviews-area">
            <div class="container">

                
                <div class="row" *ngIf="!isLoading">
                    <div class="col-lg-6 col-md-12 mb-4" *ngFor="let review of reviews; let i = index">
                        <div class="review-card animate__animated animate__fadeInUp"
                            [style.animation-delay]="i * 0.1 + 's'">
                            <div class="quote-icon">
                                <i class="fa-solid fa-quote-left"></i>
                            </div>

                            <div class="review-content">
                                <p class="review-text">{{ review.review }}</p>
                            </div>

                            <div class="reviewer-info">
                                <div class="reviewer-avatar">
                                    <span>{{ getInitials(review.name) }}</span>
                                </div>
                                <div class="reviewer-details">
                                    <h4 class="reviewer-name">
                                        {{ review.name }}
                                        <span class="reviewer-country" *ngIf="review.country">
                                            <i class="fa-solid fa-location-dot"></i> {{ review.country }}
                                        </span>
                                    </h4>
                                    <p class="review-date">{{ formatDate(review.created_at) }}</p>
                                </div>
                            </div>

                        </div>
                    </div>

                    
                    <div class="col-12 text-center py-5" *ngIf="reviews.length === 0">
                        <div class="alert alert-info">
                            <i class="fa-solid fa-info-circle"></i>
                            {{ 'NO_REVIEWS_FOUND' | translate }}
                        </div>
                    </div>
                </div>

                
                <app-pagination [meta]="meta" (pageChange)="onPageChange($event)"
                    *ngIf="!isLoading && meta"></app-pagination>
            </div>
        </section>
    </div>
</section>
